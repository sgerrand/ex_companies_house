# Exclude generated/vendored files and content not authored in this repo.
# `_build/` and `deps/` are already covered by .gitignore (respect-gitignore = true).
[lint]
exclude = [
  "**/CHANGELOG.md",
  ".claude/**",
]

# Default rule set minus:
# - MD013 (line length): badge URLs and long code examples exceed 80 chars
# - MD024 (no duplicate headings): CHANGELOG repeats ## Added / ## Fixed per version
rules = [
  "MD001",
  "MD002",
  "MD003",
  "MD004",
  "MD005",
