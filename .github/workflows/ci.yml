name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  required:
    name: Required
    needs: [docs, lint-markdown, test]
    runs-on: ubuntu-latest

    steps:
      - name: Status of workflow jobs
        run: echo 'All jobs in this workflow have successfully run'

  lint-markdown:
    name: Markdown lint
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Lint Markdown files
      uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f20b273450ec8265 # v19.1.0
      with:
        globs: "**/*.md"
        config: ".markdownlint-cli2.jsonc"

  docs:
    name: Documentation
    runs-on: ubuntu-latest

    env:
      MIX_ENV: dev

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Set up Elixir
      id: setup-beam
      uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
      with:
        version-file: '.tool-versions'
        version-type: 'strict'
    - name: Cache dependencies
      id: cache-deps
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: |
          _build
          deps
        key: ${{ runner.os }}-${{ steps.setup-beam.outputs.otp-version }}-${{ steps.setup-beam.outputs.elixir-version }}-${{ env.MIX_ENV }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: ${{ runner.os }}-${{ steps.setup-beam.outputs.otp-version }}-${{ steps.setup-beam.outputs.elixir-version }}-${{ env.MIX_ENV }}-
    - name: Install and compile dependencies
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: |
        # shellcheck disable=SC1010
        mix do deps.get --only ${{ env.MIX_ENV }}, deps.compile
    - name: Generate documentation
      run: mix docs --warnings-as-errors

  test:
    name: Tests (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        otp: ['24', '25', '26', '27']
        elixir: ['1.15', '1.16', '1.17', '1.18']
        exclude:
          - { elixir: '1.15', otp: '27' }
          - { elixir: '1.16', otp: '27' }
          - { elixir: '1.17', otp: '24' }
          - { elixir: '1.18', otp: '24' }
        include:
          - elixir: '1.18'
            otp: '27'
            lint: true

    env:
      MIX_ENV: test

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Set up Elixir
      uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
      with:
        elixir-version: ${{matrix.elixir}}
        otp-version: ${{matrix.otp}}
    - name: Cache dependencies
      id: cache-deps
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: |
          _build
          deps
        key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-
    - name: Install and compile dependencies
      if: steps.cache-deps.outputs.cache-hit != 'true'
      run: |
        # shellcheck disable=SC1010
        mix do deps.get, deps.compile
    - name: Check that mix.lock is up to date
      run: mix deps.get --check-locked
      if: ${{ matrix.lint }}
    - name: Check that files are formatted
      run: mix format --check-formatted
      if: ${{ matrix.lint }}
    - name: Check for unused dependencies
      run: mix deps.unlock --check-unused
      if: ${{ matrix.lint }}
    - name: Compile code
      run: mix compile --warnings-as-errors
    - name: Run static code analysis
      run: mix credo --strict
      if: ${{ matrix.lint }}
    - name: Run tests
      run: mix test --warnings-as-errors
    - name: Report code coverage to Coveralls
      run: mix coveralls.github
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      if: ${{ matrix.lint }}
