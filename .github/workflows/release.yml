name: Release

on:
  push:
    branches:
      - main

jobs:
  release-mate:
    name: Release Mate
    uses: release-mate/action/.github/workflows/release-please.yml@v1.1.1
    secrets:
      client-id: ${{ secrets.RELEASE_MATE_CLIENT_ID }}
      app-private-key: ${{ secrets.RELEASE_MATE_PRIVATE_KEY }}
